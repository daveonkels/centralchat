services:
  backend:
    build: ./backend
    volumes:
      - ./data:/app/data
      - ./imports:/app/imports:ro
    environment:
      - DATABASE_PATH=/app/data/central-chat.db
      - IMPORTS_PATH=/app/imports
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
